---
# Maps changed file paths to playbook+limit pairs.
# Rules evaluated stateful style, first match wins.
# limit is auto-extracted from path if not set (see dispatch.py).

rules:

  # group_vars/all.yml — base keys/users applied to all LXCs
  - pattern: "ansible/inventory/group_vars/all.yml"
    playbook: "ansible/playbooks/lxc/manage.yml"

  # lxc/base role changes — re-apply base config to all running LXCs
  - pattern: "ansible/roles/lxc/**"
    playbook: "ansible/playbooks/lxc/manage.yml"

  # podman role changes — update Podman packages/config on Podman app LXCs
  - pattern: "ansible/roles/podman/**"
    playbook: "ansible/playbooks/lxc/update_podman_packages.yml"
    limit: "tag_podman_app"

  # Block jobs that will sepaku the runner itself
  - pattern: "ansible/inventory/group_vars/*/lxc/**/runner*.yml"
    action: manual_notice

  - pattern: "ansible/inventory/group_vars/tag_app_github_runner.yml"
    action: manual_notice

  - pattern: "ansible/inventory/host_vars/runner*"
    action: manual_notice

  - pattern: "ansible/roles/apps/github_runner/**/*"
    action: manual_notice

  - pattern: "ansible/playbooks/lxc/deploy_github_runner.yml"
    action: manual_notice

  # Per-cluster LXC definitions — matches any cluster group's lxc/<category>/ files
  - pattern: "ansible/inventory/group_vars/*/lxc/**/*.yml"
    playbook: "ansible/playbooks/pve/provision_lxc.yml"
    limit: "{group}"
    extra_vars:
      pve_lxc_target: "{stem}"

  # Per-cluster CIFS mounts
  - pattern: "ansible/inventory/group_vars/*/cifs.yml"
    playbook: "ansible/playbooks/pve/cifs_mount.yml"
    limit: "{group}"

  # Per-cluster NFS mounts
  - pattern: "ansible/inventory/group_vars/*/nfs.yml"
    playbook: "ansible/playbooks/pve/nfs_mount.yml"
    limit: "{group}"

  # Per-cluster LXC defaults (ostemplate, storage, bridge, HA/replication) — re-provision all in cluster
  - pattern: "ansible/inventory/group_vars/*/lxc.yml"
    playbook: "ansible/playbooks/pve/provision_lxc.yml"
    limit: "{group}"

  # Per-cluster scratch pool dirs
  - pattern: "ansible/inventory/group_vars/*/scratch.yml"
    playbook: "ansible/playbooks/pve/scratch.yml"
    limit: "{group}"

  # Standalone host-specific files — must be before the pve*/** catch-all
  - pattern: "ansible/inventory/host_vars/pve*/lxc/*.yml"
    playbook: "ansible/playbooks/pve/provision_lxc.yml"
    extra_vars:
      pve_lxc_target: "{stem}"

  - pattern: "ansible/inventory/host_vars/pve*/scratch.yml"
    playbook: "ansible/playbooks/pve/scratch.yml"

  - pattern: "ansible/inventory/host_vars/pve*/cifs.yml"
    playbook: "ansible/playbooks/pve/cifs_mount.yml"

  - pattern: "ansible/inventory/host_vars/pve*/nfs.yml"
    playbook: "ansible/playbooks/pve/nfs_mount.yml"

  # Catch-all for remaining standalone host var changes
  - pattern: "ansible/inventory/host_vars/pve*/**"
    playbook: "ansible/playbooks/pve/system_config.yml"

  - pattern: "ansible/inventory/host_vars/pve*.yml"
    playbook: "ansible/playbooks/pve/system_config.yml"

  - pattern: "ansible/inventory/host_vars/frigate*"
    playbook: "ansible/playbooks/lxc/deploy_frigate_docker.yml"

  - pattern: "ansible/inventory/host_vars/pbs*"
    playbook: "ansible/playbooks/lxc/deploy_pbs.yml"

  - pattern: "ansible/inventory/host_vars/pdm*"
    playbook: "ansible/playbooks/lxc/deploy_pdm.yml"

  - pattern: "ansible/inventory/host_vars/crowdsec*"
    playbook: "ansible/playbooks/lxc/deploy_crowdsec_lapi.yml"

  - pattern: "ansible/inventory/host_vars/technitium*"
    playbook: "ansible/playbooks/lxc/deploy_podman_app.yml"

  # LXC host_vars — reads dispatch_playbook: and/or podman_apps: from the file itself
  - pattern: "ansible/inventory/host_vars/*.yml"
    action: host_self

  # Ingress stack
  - pattern: "ansible/inventory/group_vars/tag_app_ingress_aah/**"
    playbook: "ansible/playbooks/app/ingress.yml"
    limit: "tag_app_ingress_aah"

  - pattern: "ansible/inventory/group_vars/tag_app_ingress_aah"
    playbook: "ansible/playbooks/app/ingress.yml"
    limit: "tag_app_ingress_aah"

  - pattern: "ansible/inventory/group_vars/tag_app_cftun_aah.yml"
    playbook: "ansible/playbooks/app/ingress.yml"
    limit: "tag_app_cftun_aah"

  - pattern: "ansible/inventory/group_vars/tag_podman_app.yml"
    playbook: "ansible/playbooks/lxc/update_podman_packages.yml"
    limit: "tag_podman_app"

  - pattern: "ansible/inventory/group_vars/tag_app_technitium.yml"
    playbook: "ansible/playbooks/lxc/deploy_podman_app.yml"
    limit: "tag_app_technitium"

  - pattern: "ansible/inventory/group_vars/proxmox.yml"
    playbook: "ansible/playbooks/pve/post_install.yml"
    limit: "proxmox"

  # Changed playbook runs itself directly
  - pattern: "ansible/playbooks/**/*.yml"
    action: playbook_self
