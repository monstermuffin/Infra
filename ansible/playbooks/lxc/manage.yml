---
# Compatibility entrypoint for Linux guest management.
# Prefer playbooks/linux/manage.yml now.

- name: Manage Linux guests
  hosts: "{{ target | default('linux_guests:&proxmox_all_running') }}"
  gather_facts: true
  vars:
    ansible_user: "{{ linux_manage_user | default(lxc_manage_user | default('ansible')) }}"
  become: true
  roles:
    - linux/base
