---
# Deploy/Maintain Seafile.
#
# Full deploy:
#   ansible-playbook playbooks/vm/deploy_seafile.yml
#
# OS setup only:
#   ansible-playbook playbooks/vm/deploy_seafile.yml --tags base
#
# Podman + volumes only (skip OS):
#   ansible-playbook playbooks/vm/deploy_seafile.yml --tags podman
#
# App deploy only (images, Quadlet files, service):
#   ansible-playbook playbooks/vm/deploy_seafile.yml --tags deploy

- name: Deploy Seafile VM
  hosts: "{{ target | default('tag_app_seafile') }}"
  become: true
  gather_facts: false
  vars:
    ansible_user: "{{ linux_manage_user | default('ansible') }}"

  pre_tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        sleep: 5
        timeout: 300

    - name: Gather facts
      ansible.builtin.setup:
      tags: always

    - name: Check if cloud-init is installed
      ansible.builtin.stat:
        path: /usr/bin/cloud-init
      register: _cloud_init_binary

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: >-
        _cloud_init_status.rc not in [0, 2]
        or (
          _cloud_init_status.rc == 2
          and 'status: done' not in (_cloud_init_status.stdout | default(''))
        )
      register: _cloud_init_status
      when: _cloud_init_binary.stat.exists

  tasks:
    - name: Ensure NFS seafile-data volume exists with correct options
      tags: [volumes, podman]
      block:
        - name: Inspect seafile-data volume
          ansible.builtin.command: podman volume inspect {{ seafile_nfs_volume_name }}
          become: true
          register: _seafile_vol_inspect
          failed_when: false
          changed_when: false

        - name: Create or recreate seafile-data NFS volume
          ansible.builtin.shell: |
            podman volume rm {{ seafile_nfs_volume_name }} 2>/dev/null || true
            podman volume create \
              --driver local \
              --opt type=nfs \
              --opt o={{ seafile_nfs_opts }} \
              --opt device={{ seafile_nfs_server }}:{{ seafile_nfs_path }} \
              {{ seafile_nfs_volume_name }}
          become: true
          changed_when: true
          when: >-
            _seafile_vol_inspect.rc != 0 or
            seafile_nfs_server not in (_seafile_vol_inspect.stdout | default(''))

  roles:
    - role: linux/base
      tags:
        - base
        - setup
    - role: podman
      tags:
        - podman
        - install
    - role: apps/podman_app
      tags:
        - app
        - deploy
