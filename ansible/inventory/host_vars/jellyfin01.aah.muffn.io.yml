---
proxmox_node: pve02.aah.muffn.io

podman_enabled: true

podman_apps:
  jellyfin:
    enabled: true
    image: jellyfin/jellyfin
    tag: latest
    port: 8096
    network_mode: host
    tmpfs:
      - /cache
    volumes:
      - /opt/jellyfin/config:/config
      - /mnt/media/movies:/movies
      - /mnt/media/tv:/tv
      - /mnt/media/music:/music
      - /mnt/media/youtube:/youtube
    devices:
      - /dev/dri/renderD128
      - /dev/dri/card0
    env:
      TZ: Europe/London
