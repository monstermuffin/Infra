---
podman_enabled: true

podman_apps:
  comentario:
    enabled: true
    image: registry.gitlab.com/comentario/comentario
    # renovate: datasource=docker depName=registry.gitlab.com/comentario/comentario
    tag: v3.16.0-ubuntu
    container_name: comentario
    port: 8080
    container_port: 80
    volumes:
      - /opt/comentario/data:/var/lib/comentario
      - /opt/comentario/config/secrets.yaml:/etc/comentario/secrets.yaml:ro
    files:
      - dest: /opt/comentario/config/secrets.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          sqlite3:
            file: /var/lib/comentario/comentario.sqlite3
          smtpServer:
            host: smtp.protonmail.ch
            port: 587
            username: blog@muffn.io
            password: "{{ comentario_smtp_password | trim }}"
            encryption: tls
            insecure: false
          idp:
            github:
              key: "{{ comentario_github_key | trim }}"
              secret: "{{ comentario_github_secret | trim }}"
            gitlab:
              key: "{{ comentario_gitlab_key | trim }}"
              secret: "{{ comentario_gitlab_secret | trim }}"
          extensions:
            akismet:
              disable: false
              key: "{{ comentario_akismet_key | trim }}"
    env:
      HOST: 0.0.0.0
      PORT: "80"
      BASE_URL: https://comments.muffn.io
      SECRETS_FILE: /etc/comentario/secrets.yaml
      LOG_FULL_IPS: "true"
      HOME_CONTENT_URL: https://docs.comentario.app/en/embed/front-page/

