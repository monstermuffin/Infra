---
podman_enabled: true

podman_apps:
  prometheus:
    enabled: true
    image: prom/prometheus
    # renovate: datasource=docker depName=prom/prometheus
    tag: v3.11.2
    port: 9090
    uid: 65534
    gid: 65534
    volumes:
      - /opt/metrics01/prometheus:/prometheus
      - /opt/metrics01/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    files:
      - dest: /opt/metrics01/prometheus.yml
        template_src: prometheus.yml.j2
        owner: root
        group: root
        mode: "0644"
    exec: >-
      --config.file=/etc/prometheus/prometheus.yml
      --storage.tsdb.path=/prometheus
      --storage.tsdb.retention.time=30d
      --storage.tsdb.retention.size=150GB
      --web.enable-lifecycle
    env:
      TZ: Europe/London

  grafana:
    enabled: true
    image: grafana/grafana
    # renovate: datasource=docker depName=grafana/grafana
    tag: 13.0.0
    port: 3000
    uid: 472
    gid: 0
    volumes:
      - /opt/metrics01/grafana:/var/lib/grafana
    env:
      TZ: Europe/London
      GF_SERVER_ROOT_URL: "https://metrics.muffn.io"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Pocket ID"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "d1175001-f000-4d86-abd5-c09ccd352d86"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ grafana_pocketid_client_secret | trim }}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://id.muffn.io/authorize"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://id.muffn.io/api/oidc/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://id.muffn.io/api/oidc/userinfo"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://id.muffn.io/logout"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'grafana_admin') && 'Admin' || contains(groups[*], 'grafana_viewer') && 'Viewer' || 'Viewer'"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"

grafana_pocketid_client_secret: !vault |
        $ANSIBLE_VAULT;1.1;AES256
        39323437376464613734333931613665326236396162366262336430623363313631373837386363
        3866386162333335303364363562303235316634643639640a643235383839323531333136383465
        66663532656462653962633638343565376634396331366337633366376561393162336331626664
        3334633335363536320a613636373031613538313766363838656238383733356265376666383263
        61336131623433663934636132613339363130376662663531373638616235333463303563623535
        6430666138353763353837623037653436323034343863646462