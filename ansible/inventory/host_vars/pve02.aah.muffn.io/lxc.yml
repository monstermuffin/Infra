---
pve_lxc_default_network_bridge: "vmbr1"
pve_lxc_default_storage: "local-zfs"

pve_lxcs:
  qdev01:
    vmid: 100
    hostname: qdev01.aah.muffn.io
    node: pve02
    cores: 1
    memory: 512
    swap: 0
    disk: "4G"
    storage: "local-lvm"
    network_ip: "10.82.2.149/24"
    network_gw: "10.82.2.1"
    network_bridge: "vmbr1"
    network_vlan: 702
    unprivileged: true
    onboot: true
    tags:
      - ansible
      - site_aah
      - app_qdevice
    features:
      nesting: true
      keyctl: false

  pbs01:
    vmid: 202
    hostname: pbs01.aah.muffn.io
    node: pve02
    cores: 4
    memory: 8192
    swap: 512
    disk: "128G"
    network_ip: "10.82.2.202/24"
    network_gw: "10.82.2.1"
    network_vlan: 702
    unprivileged: false
    runtime: baremetal
    tags:
      - ansible
      - site_aah
      - baremetal_app
      - pbs_aah
      - app_pbs
    features:
      nesting: true
      keyctl: false
    bind_mounts:
      - host_path: /mnt/aah-fs02/pbs-data
        lxc_path: /mnt/pbs-data

  plex01:
    vmid: 125
    hostname: plex01.aah.muffn.io
    node: pve02
    cores: 8
    memory: 8192
    swap: 512
    disk: "512G"
    storage: "local-zfs"
    network_ip: "10.82.10.125/24"
    network_gw: "10.82.10.1"
    network_vlan: 710
    unprivileged: true
    runtime: podman
    tags:
      - ansible
      - site_aah
      - podman_app
      - app_plex
    features:
      nesting: true
      keyctl: true
    devices:
      - path: /dev/dri/renderD128
        mode: "0666"
      - path: /dev/dri/card0
        mode: "0666"
    bind_mounts:
      - host_path: /mnt/aah-fs01/media
        lxc_path: /mnt/media
        shared: true

  jellyfin01:
    vmid: 126
    hostname: jellyfin01.aah.muffn.io
    node: pve02
    cores: 8
    memory: 8192
    swap: 512
    disk: "512G"
    storage: "local-zfs"
    network_ip: "10.82.10.126/24"
    network_gw: "10.82.10.1"
    network_vlan: 710
    unprivileged: true
    runtime: podman
    tags:
      - ansible
      - site_aah
      - podman_app
      - app_jellyfin
    features:
      nesting: true
      keyctl: true
    devices:
      - path: /dev/dri/renderD128
        mode: "0666"
      - path: /dev/dri/card0
        mode: "0666"
    bind_mounts:
      - host_path: /mnt/aah-fs01/media
        lxc_path: /mnt/media
        shared: true

  rembg01:
    vmid: 127
    hostname: rembg01.aah.muffn.io
    node: pve02
    cores: 2
    memory: 1024
    swap: 512
    disk: "16G"
    storage: "local-zfs"
    network_ip: "10.82.10.127/24"
    network_gw: "10.82.10.1"
    network_vlan: 710
    unprivileged: true
    runtime: podman
    tags:
      - ansible
      - site_aah
      - podman_app
      - app_rembg
    features:
      nesting: true
      keyctl: true
    devices:
      - path: /dev/dri/renderD128
        mode: "0666"
      - path: /dev/dri/card0
        mode: "0666"
