---
# Example bindings for reference.
# Preferred layout: one keyed ingress_routes map per app.

ingress_routes:
  appname:
    hostname: app.example.com
    upstream_host: 10.0.0.10
    service_port: 8080
    oidc_enabled: true
    exempt_paths: ["/api"]
  otherapp:
    hostname: otherapp.example.com
    upstream_host: 10.0.0.11
    service_port: 3000
  paperless:
    hostname: docs.example.net
    upstream_host: 10.0.0.13
    service_port: 8084
  vaultwarden:
    hostname: vault.example.com
    upstream_host: 10.0.0.14
    service_port: 8443
    service_scheme: https
    service_insecure_skip_verify: true

ingress_crowdsec_lapi_host: "10.0.0.20:8080"
ingress_oidc_issuer: "https://id.example.com"
ingress_oidc_cookie_domain: ".example.com"
