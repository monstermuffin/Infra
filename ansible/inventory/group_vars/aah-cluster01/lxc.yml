---
# Cluster-wide LXC defaults. Overridable per-container in lxc_*.yml files.
pve_lxc_default_ostemplate: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
pve_lxc_default_storage: "local-zfs"
pve_lxc_default_network_bridge: "vmbr1"

# Override individual keys with `combine: ha: "{{ lxc_ha_default | combine({'max_restart': 3}) }}"`
lxc_ha_default:
  enabled: true
  state: started
  max_restart: 1
  max_relocate: 1

lxc_replication_default:
  enabled: true
  schedule: "*/15"
  # rate: 50

lxc_features_podman:
  nesting: true
  keyctl: true
lxc_features_docker:
  nesting: true
  keyctl: false
