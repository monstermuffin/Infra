---
pve_lxcs_radarr01:
  radarr01:
    vmid: 112
    hostname: radarr01.aah.muffn.io
    node: pve03
    cores: 2
    memory: 2048
    swap: 512
    disk: "32G"
    network_ip: "10.82.10.112/24"
    network_gw: "10.82.10.1"
    network_vlan: 710
    unprivileged: true
    tags:
      - ansible
      - os_linux
      - os_trixie
      - site_aah
      - podman_app
      - app_radarr
    features: "{{ lxc_features_podman }}"
    bind_mounts:
      - host_path: /mnt/aah-fs01/media/movies
        lxc_path: /mnt/movies
        shared: true
      - host_path: /mnt/scratch/downloads
        lxc_path: /mnt/downloads
        shared: true
    ha: "{{ lxc_ha_default }}"
    replication: "{{ lxc_replication_default }}"
