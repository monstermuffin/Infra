---
pve_lxcs_grimmory01:
  grimmory01:
    vmid: 123
    hostname: grimmory01.aah.muffn.io
    node: pve03
    cores: 2
    memory: 4096
    swap: 512
    disk: "32G"
    network_ip: "10.82.10.123/24"
    network_gw: "10.82.10.1"
    network_vlan: 710
    unprivileged: true
    runtime: podman
    tags:
      - ansible
      - site_aah
      - podman_app
      - app_grimmory
    features: "{{ lxc_features_podman }}"
    bind_mounts:
      - host_path: /mnt/scratch/bookdrop
        lxc_path: /bookdrop
        shared: true
    ha: "{{ lxc_ha_default }}"
    replication: "{{ lxc_replication_default }}"
