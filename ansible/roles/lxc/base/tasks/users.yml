---
- name: Fail if root user SSH keys are empty
  ansible.builtin.fail:
    msg: "No SSH keys were configured for root user."
  when: lxc_root_authorized_keys | default('', true) | trim == ''

- name: Add SSH keys for root user
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lxc_root_authorized_keys }}"
    exclusive: "{{ lxc_root_authorized_keys_exclusive }}"
    manage_dir: true

- name: Create ansible user
  ansible.builtin.user:
    name: "{{ lxc_ansible_user }}"
    state: present
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Fail if ansible user SSH keys are empty
  ansible.builtin.fail:
    msg: "No SSH keys were configured for ansible user '{{ lxc_ansible_user }}'."
  when: lxc_ansible_authorized_keys | default('', true) | trim == ''

- name: Add SSH key for ansible user
  ansible.posix.authorized_key:
    user: "{{ lxc_ansible_user }}"
    state: present
    key: "{{ lxc_ansible_authorized_keys }}"
    exclusive: "{{ lxc_ansible_authorized_keys_exclusive }}"
    manage_dir: true

- name: Configure passwordless sudo for ansible user
  ansible.builtin.copy:
    content: "{{ lxc_ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ lxc_ansible_user }}"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'

- name: Create admin user
  ansible.builtin.user:
    name: "{{ lxc_admin_user }}"
    state: present
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Fail if admin user SSH keys are empty
  ansible.builtin.fail:
    msg: "No SSH keys were configured for admin user '{{ lxc_admin_user }}'."
  when: lxc_admin_authorized_keys | default('', true) | trim == ''

- name: Add SSH keys for admin user
  ansible.posix.authorized_key:
    user: "{{ lxc_admin_user }}"
    state: present
    key: "{{ lxc_admin_authorized_keys }}"
    exclusive: "{{ lxc_admin_authorized_keys_exclusive }}"
    manage_dir: true

- name: Configure passwordless sudo for admin user
  ansible.builtin.copy:
    content: "{{ lxc_admin_user }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ lxc_admin_user }}"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
