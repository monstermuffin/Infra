---
- name: Resolve requested LXC selector
  ansible.builtin.set_fact:
    _pve_lxc_effective_target: "{{ pve_lxc_target | default(target | default(''), true) }}"
    _pve_lxcs_effective: {}
    _pve_lxc_selector_matched_host: false
  tags: [always]

# If any pve_lxcs_<category> variables are defined, combine them into pve_lxcs. Splits old monolithic files.
- name: Combine pve_lxcs_* category variables into pve_lxcs
  ansible.builtin.set_fact:
    pve_lxcs: >-
      {%- set ns = namespace(result=pve_lxcs | default({})) -%}
      {%- for key, val in hostvars[inventory_hostname].items() -%}
        {%- if key is match('^pve_lxcs_') and val is mapping -%}
          {%- set ns.result = ns.result | combine(val) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.result }}
  when: >-
    hostvars[inventory_hostname] | dict2items
    | selectattr('key', 'match', '^pve_lxcs_') | list | length > 0
  tags: [always]

- name: Filter LXC map by requested selector
  ansible.builtin.set_fact:
    _pve_lxcs_effective: >-
      {%- set selector = _pve_lxc_effective_target | default('') -%}
      {%- set ns = namespace(result={}) -%}
      {%- for item in (pve_lxcs | default({}) | dict2items) -%}
        {%- set lxc = item.value -%}
        {%- set hostname = lxc.hostname | default('') -%}
        {%- set lxc_tags = lxc.tags | default([]) -%}
        {%- if selector | length == 0 -%}
          {%- set ns.result = ns.result | combine({item.key: lxc}) -%}
        {%- elif selector is match('^tag:.+') and selector | regex_replace('^tag:', '') in lxc_tags -%}
          {%- set ns.result = ns.result | combine({item.key: lxc}) -%}
        {%- elif item.key == selector or hostname == selector -%}
          {%- set ns.result = ns.result | combine({item.key: lxc}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.result }}
  when: pve_lxcs is defined and pve_lxcs | length > 0
  tags: [always]

- name: Mark whether this host matched the requested selector
  ansible.builtin.set_fact:
    _pve_lxc_selector_matched_host: "{{ _pve_lxcs_effective | length > 0 }}"
  when: pve_lxcs is defined and pve_lxcs | length > 0
  tags: [always]

- name: Record global selector match
  ansible.builtin.set_fact:
    _pve_lxc_selector_found: true
  delegate_to: localhost
  delegate_facts: true
  when:
    - _pve_lxc_effective_target | length > 0
    - _pve_lxcs_effective | length > 0
  tags: [always]

- name: Detect duplicate LXC VMIDs
  ansible.builtin.set_fact:
    _pve_lxc_duplicate_vmids: >-
      {%- set ns = namespace(seen={}, duplicates=[]) -%}
      {%- for item in (pve_lxcs | default({}) | dict2items) -%}
        {%- set vmid = item.value.vmid | string -%}
        {%- if vmid in ns.seen -%}
          {%- set _ = ns.duplicates.append(vmid ~ ' (' ~ ns.seen[vmid] ~ ', ' ~ item.key ~ ')') -%}
        {%- else -%}
          {%- set _ = ns.seen.update({vmid: item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.duplicates }}
  when: pve_lxcs is defined and pve_lxcs | length > 0
  tags: [always]

- name: Detect selected LXC VMID conflicts
  ansible.builtin.set_fact:
    _pve_lxc_selected_duplicate_vmids: >-
      {%- set selected_vmids = (_pve_lxcs_effective | dict2items | map(attribute='value.vmid') | map('string') | unique | list) -%}
      {%- set ns = namespace(seen={}, duplicates=[]) -%}
      {%- for item in (pve_lxcs | default({}) | dict2items) -%}
        {%- set vmid = item.value.vmid | string -%}
        {%- if vmid in selected_vmids -%}
          {%- if vmid in ns.seen -%}
            {%- set _ = ns.duplicates.append(vmid ~ ' (' ~ ns.seen[vmid] ~ ', ' ~ item.key ~ ')') -%}
          {%- else -%}
            {%- set _ = ns.seen.update({vmid: item.key}) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.duplicates }}
  when:
    - pve_lxcs is defined and pve_lxcs | length > 0
    - _pve_lxc_effective_target | length > 0
    - _pve_lxcs_effective | length > 0
  tags: [always]

- name: Detect duplicate LXC hostnames
  ansible.builtin.set_fact:
    _pve_lxc_duplicate_hostnames: >-
      {%- set ns = namespace(seen={}, duplicates=[]) -%}
      {%- for item in (pve_lxcs | default({}) | dict2items) -%}
        {%- set hostname = item.value.hostname | default(item.key) -%}
        {%- if hostname in ns.seen -%}
          {%- set _ = ns.duplicates.append(hostname ~ ' (' ~ ns.seen[hostname] ~ ', ' ~ item.key ~ ')') -%}
        {%- else -%}
          {%- set _ = ns.seen.update({hostname: item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.duplicates }}
  when: pve_lxcs is defined and pve_lxcs | length > 0
  tags: [always]

- name: Detect selected LXC hostname conflicts
  ansible.builtin.set_fact:
    _pve_lxc_selected_duplicate_hostnames: >-
      {%- set selected_hostnames = (_pve_lxcs_effective | dict2items | map(attribute='value.hostname') | map('default', '', true) | unique | list) -%}
      {%- set ns = namespace(seen={}, duplicates=[]) -%}
      {%- for item in (pve_lxcs | default({}) | dict2items) -%}
        {%- set hostname = item.value.hostname | default(item.key) -%}
        {%- if hostname in selected_hostnames -%}
          {%- if hostname in ns.seen -%}
            {%- set _ = ns.duplicates.append(hostname ~ ' (' ~ ns.seen[hostname] ~ ', ' ~ item.key ~ ')') -%}
          {%- else -%}
            {%- set _ = ns.seen.update({hostname: item.key}) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.duplicates }}
  when:
    - pve_lxcs is defined and pve_lxcs | length > 0
    - _pve_lxc_effective_target | length > 0
    - _pve_lxcs_effective | length > 0
  tags: [always]

- name: Fail on duplicate LXC identifiers
  ansible.builtin.fail:
    msg: >-
      Duplicate LXC definitions were found.
      Duplicate VMIDs: {{
        (_pve_lxc_effective_target | length > 0)
        | ternary(
            _pve_lxc_selected_duplicate_vmids | default([]) | join(', ') | default('none', true),
            _pve_lxc_duplicate_vmids | default([]) | join(', ') | default('none', true)
          )
      }}.
      Duplicate hostnames: {{
        (_pve_lxc_effective_target | length > 0)
        | ternary(
            _pve_lxc_selected_duplicate_hostnames | default([]) | join(', ') | default('none', true),
            _pve_lxc_duplicate_hostnames | default([]) | join(', ') | default('none', true)
          )
      }}.
      Each managed LXC must have a unique vmid and hostname.
      To bypass run with
      `-e pve_lxc_allow_duplicate_identifiers=true`.
  when:
    - pve_lxcs is defined and pve_lxcs | length > 0
    - >-
      (
        (_pve_lxc_effective_target | length == 0) and (
          (_pve_lxc_duplicate_vmids | default([]) | length > 0) or
          (_pve_lxc_duplicate_hostnames | default([]) | length > 0)
        )
      ) or (
        (_pve_lxc_effective_target | length > 0) and (
          (_pve_lxc_selected_duplicate_vmids | default([]) | length > 0) or
          (_pve_lxc_selected_duplicate_hostnames | default([]) | length > 0)
        )
      )
    - not (pve_lxc_allow_duplicate_identifiers | bool)
  tags: [always]

- name: Skip host if pve_lxcs is not defined
  ansible.builtin.meta: end_host
  when: pve_lxcs is not defined or pve_lxcs | length == 0
  tags:
    - always

- name: Fail if LXC bootstrap SSH keys are empty
  ansible.builtin.fail:
    msg: "No bootstrap SSH keys were configured for LXC provisioning."
  when:
    - _pve_lxcs_effective | length > 0
    - pve_lxc_bootstrap_authorized_keys_list | default([]) | length == 0
  tags:
    - provision
    - create

- name: Set bootstrap SSH public keys fact
  ansible.builtin.set_fact:
    _ssh_keys: "{{ pve_lxc_bootstrap_authorized_keys_list }}"
  when: _pve_lxcs_effective | length > 0
  tags:
    - provision
    - create

- name: Include LXC provisioning tasks
  ansible.builtin.include_tasks: provision_lxc.yml
  loop: "{{ _pve_lxcs_effective | dict2items }}"
  loop_control:
    loop_var: lxc_item
    label: "{{ lxc_item.key }} (VMID {{ lxc_item.value.vmid }})"
  tags:
    - provision
    - create

- name: Include HA configuration tasks
  ansible.builtin.include_tasks: configure_ha.yml
  loop: "{{ _pve_lxcs_effective | dict2items | selectattr('value.ha.enabled', 'defined') | selectattr('value.ha.enabled') | list }}"
  loop_control:
    loop_var: lxc_item
    label: "{{ lxc_item.key }} (VMID {{ lxc_item.value.vmid }})"
  tags:
    - provision
    - ha

- name: Include replication configuration tasks
  ansible.builtin.include_tasks: configure_replication.yml
  loop: "{{ _pve_lxcs_effective | dict2items | selectattr('value.replication.enabled', 'defined') | selectattr('value.replication.enabled') | list }}"
  loop_control:
    loop_var: lxc_item
    label: "{{ lxc_item.key }} (VMID {{ lxc_item.value.vmid }})"
  tags:
    - provision
    - replication
