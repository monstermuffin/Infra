---
- name: Configure SSH server settings
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  loop:
    - regexp: "^#?Port "
      line: "Port {{ pve_system_ssh_port }}"
    - regexp: "^#?PermitRootLogin "
      line: "PermitRootLogin {{ pve_system_ssh_permit_root_login }}"
    - regexp: "^#?PasswordAuthentication "
      line: "PasswordAuthentication {{ 'yes' if pve_system_ssh_password_authentication else 'no' }}"
  notify: Restart sshd

- name: Fail if root SSH keys are empty
  ansible.builtin.fail:
    msg: "No SSH keys were configured for Proxmox root user."
  when: pve_system_root_authorized_keys | default('', true) | trim == ''
  tags:
    - ssh-keys

- name: Ensure .ssh directory exists for root
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags:
    - ssh-keys

- name: Set authorized_keys for root
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ pve_system_root_authorized_keys }}"
    exclusive: "{{ pve_system_root_authorized_keys_exclusive }}"
    manage_dir: true
  tags:
    - ssh-keys

- name: Ensure SSH service is enabled and running
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started
