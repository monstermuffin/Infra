---

- name: Gather facts
  ansible.builtin.setup:

- name: Create ansible user
  ansible.builtin.user:
    name: "{{ ansible_user_name }}"
    state: present
    shell: /bin/bash
    create_home: true
    groups: "{{ ansible_user_groups }}"
    append: true
  tags:
    - user

- name: Fail if ansible user SSH keys are empty
  ansible.builtin.fail:
    msg: "No SSH keys were configured for ansible user '{{ ansible_user_name }}'."
  when: ansible_authorized_keys | default('', true) | trim == ''
  tags:
    - ssh

- name: Set up SSH key for ansible user
  ansible.posix.authorized_key:
    user: "{{ ansible_user_name }}"
    state: present
    key: "{{ ansible_authorized_keys }}"
    exclusive: false
  tags:
    - ssh


- name: Ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: true
  tags:
    - sudo

- name: Configure passwordless sudo for ansible user
  ansible.builtin.copy:
    content: "{{ ansible_user_name }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ ansible_user_name }}"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  tags:
    - sudo

- name: Verify ansible user can sudo
  ansible.builtin.command: sudo -n true
  become: true
  become_user: "{{ ansible_user_name }}"
  changed_when: false
  tags:
    - verify
