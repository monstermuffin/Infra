---
- name: Deploy Podman Quadlet volume files
  ansible.builtin.template:
    src: volume.j2
    dest: /etc/containers/systemd/{{ volume_item.key }}.volume
    owner: root
    group: root
    mode: '0644'
  loop: "{{ podman_volumes | dict2items }}"
  loop_control:
    loop_var: volume_item
    label: "{{ volume_item.key }}"
  register: _podman_volumes_result

- name: Reload systemd daemon after volume changes # noqa: no-handler
  ansible.builtin.systemd:
    daemon_reload: true
  when: _podman_volumes_result.changed
