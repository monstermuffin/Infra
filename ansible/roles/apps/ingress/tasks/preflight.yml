---
- name: Determine ingress route input mode
  ansible.builtin.set_fact:
    _ingress_route_input_mode: >-
      {%- if ingress_routes is mapping and ingress_routes | length > 0 -%}
      keyed
      {%- elif ingress_routes is sequence and ingress_routes is not string and ingress_routes | length > 0 -%}
      list
      {%- else -%}
      none
      {%- endif -%}
  tags:
    - always

- name: Cache keyed ingress route definitions
  ansible.builtin.set_fact:
    _ingress_route_defs: "{{ ingress_routes }}"
  when: _ingress_route_input_mode == 'keyed'
  tags:
    - always

- name: Initialize composed ingress routes
  ansible.builtin.set_fact:
    ingress_routes: []
  when: _ingress_route_input_mode == 'keyed'
  tags:
    - always

- name: Validate keyed ingress route inputs
  ansible.builtin.assert:
    that:
      - route_def.value.hostname is defined
      - route_def.value.hostname | length > 0
      - >
        (
          route_def.value.service_url is defined
          and route_def.value.service_url | length > 0
        )
        or
        (
          route_def.value.upstream_host is defined
          and route_def.value.upstream_host | length > 0
          and route_def.value.service_port is defined
        )
    fail_msg: "Each keyed ingress_routes entry requires hostname and either service_url or upstream_host plus service_port."
  loop: "{{ _ingress_route_defs | dict2items }}"
  loop_control:
    loop_var: route_def
    label: "{{ route_def.key }}"
  when: _ingress_route_input_mode == 'keyed'
  tags:
    - always

- name: Compose ingress routes from keyed definitions
  ansible.builtin.set_fact:
    ingress_routes: "{{ ingress_routes + [route_data] }}"
  vars:
    route_data: >-
      {{
        {
          'name': route_def.key,
          'hostname': route_def.value.hostname,
          'service_url': (
            route_def.value.service_url
            if route_def.value.service_url is defined
            else (
              (route_def.value.service_scheme | default(ingress_route_service_scheme_default))
              ~ '://'
              ~ route_def.value.upstream_host
              ~ ':'
              ~ (route_def.value.service_port | string)
            )
          ),
          'oidc_enabled': route_def.value.oidc_enabled | default(false)
        }
        | combine(
            (route_def.value.service_insecure_skip_verify is defined)
            | ternary({'service_insecure_skip_verify': route_def.value.service_insecure_skip_verify}, {})
          )
        | combine(
            (route_def.value.exempt_paths is defined)
            | ternary({'exempt_paths': route_def.value.exempt_paths}, {})
          )
      }}
  loop: "{{ _ingress_route_defs | dict2items }}"
  loop_control:
    loop_var: route_def
    label: "{{ route_def.key }}"
  when: _ingress_route_input_mode == 'keyed'
  tags:
    - always

- name: Determine whether any routes require OIDC
  ansible.builtin.set_fact:
    _ingress_oidc_required: "{{ ingress_routes | selectattr('oidc_enabled', 'defined') | selectattr('oidc_enabled') | list | length > 0 }}"
  tags:
    - always

- name: Validate ingress routes are defined
  ansible.builtin.assert:
    that:
      - ingress_routes | length > 0
      - ingress_crowdsec_lapi_host | length > 0
      - ingress_crowdsec_registration_token | trim | length >= 32
      - ingress_crowdsec_bouncer_api_key | trim | length > 0
    fail_msg: "Define ingress_routes and a valid ingress_crowdsec_* configuration before deploying ingress."
  tags:
    - always

- name: Validate route fields
  ansible.builtin.assert:
    that:
      - route_item.hostname is defined
      - route_item.hostname | length > 0
      - route_item.service_url is defined
      - route_item.service_url | length > 0
    fail_msg: "Each ingress route requires hostname and service_url."
  loop: "{{ ingress_routes }}"
  loop_control:
    loop_var: route_item
    label: "{{ route_item.hostname | default('missing-hostname') }}"
  tags:
    - always

- name: Validate OIDC settings when protected routes exist
  ansible.builtin.assert:
    that:
      - ingress_oidc_issuer | length > 0
      - ingress_oidc_cookie_domain | length > 0
      - ingress_oidc_client_id | length > 0
      - ingress_oidc_client_secret | trim | length > 0
      - ingress_oidc_session_secret | trim | length >= 32
    fail_msg: "OIDC-protected routes require ingress_oidc_* variables and a session secret of at least 32 characters."
  when: _ingress_oidc_required
  tags:
    - always
