---
- name: Write CrowdSec LAPI local config
  ansible.builtin.template:
    src: config.yaml.local.j2
    dest: /etc/crowdsec/config.yaml.local
    mode: "0644"

- name: Enable and start CrowdSec service
  ansible.builtin.systemd:
    name: crowdsec
    enabled: true
    state: restarted
    daemon_reload: true

- name: Check existing CrowdSec bouncers
  ansible.builtin.command:
    argv:
      - cscli
      - bouncers
      - list
      - -o
      - raw
  register: _crowdsec_lapi_bouncers
  changed_when: false

- name: Check existing CrowdSec machines
  ansible.builtin.command:
    argv:
      - cscli
      - machines
      - list
      - -o
      - raw
  register: _crowdsec_lapi_machines
  changed_when: false

- name: Create shared Traefik bouncer key
  ansible.builtin.command:
    argv:
      - cscli
      - bouncers
      - add
      - "{{ crowdsec_traefik_bouncer_name }}"
      - --key
      - "{{ crowdsec_traefik_bouncer_api_key | trim }}"
  when: crowdsec_traefik_bouncer_name not in _crowdsec_lapi_bouncers.stdout
  changed_when: true

- name: Create CrowdSec Web UI machine account
  ansible.builtin.command:
    argv:
      - cscli
      - machines
      - add
      - "{{ crowdsec_web_ui_machine_name }}"
      - --password
      - "{{ crowdsec_web_ui_machine_password | trim }}"
      - -f
      - /dev/null
  when:
    - crowdsec_web_ui_enabled
    - crowdsec_web_ui_machine_name not in _crowdsec_lapi_machines.stdout
  changed_when: true

- name: Check existing LAPI allowlists
  ansible.builtin.command:
    argv:
      - cscli
      - allowlists
      - list
      - -o
      - raw
  register: _crowdsec_lapi_allowlists
  changed_when: false
  when: crowdsec_lapi_allowlist_ips | length > 0

- name: Create LAPI trusted-networks allowlist
  ansible.builtin.command:
    argv:
      - cscli
      - allowlists
      - create
      - "{{ crowdsec_lapi_allowlist_name }}"
      - -d
      - "Trusted home/admin IPs - managed by Ansible"
  when:
    - crowdsec_lapi_allowlist_ips | length > 0
    - crowdsec_lapi_allowlist_name not in _crowdsec_lapi_allowlists.stdout
  changed_when: true

- name: Check IPs already in LAPI allowlist
  ansible.builtin.command:
    argv:
      - cscli
      - allowlists
      - inspect
      - "{{ crowdsec_lapi_allowlist_name }}"
      - -o
      - raw
  register: _crowdsec_lapi_allowlist_contents
  changed_when: false
  when: crowdsec_lapi_allowlist_ips | length > 0

- name: Add IPs to LAPI allowlist
  ansible.builtin.command:
    argv:
      - cscli
      - allowlists
      - add
      - "{{ crowdsec_lapi_allowlist_name }}"
      - "{{ lapi_allowlist_ip | trim }}"
      - -d
      - "Trusted IP - managed by Ansible"
  loop: "{{ crowdsec_lapi_allowlist_ips }}"
  loop_control:
    loop_var: lapi_allowlist_ip
  when:
    - crowdsec_lapi_allowlist_ips | length > 0
    - lapi_allowlist_ip | trim not in _crowdsec_lapi_allowlist_contents.stdout
  changed_when: true
  no_log: true
