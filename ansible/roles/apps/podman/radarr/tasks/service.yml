---
- name: Enable and start Radarr service
  ansible.builtin.systemd:
    name: "{{ radarr_service_name }}.service"
    enabled: "{{ radarr_service_enable }}"
    state: started
    daemon_reload: true
  when: radarr_service_start

- name: Wait for Radarr to be reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ radarr_web_port }}"
    delay: 2
    timeout: 90
  when: radarr_service_start

- name: Get Radarr service status
  ansible.builtin.systemd:
    name: "{{ radarr_service_name }}.service"
  register: radarr_service_status

- name: Display Radarr service status
  ansible.builtin.debug:
    msg:
      - "Service: {{ radarr_service_name }}.service"
      - "Status: {{ radarr_service_status.status.ActiveState }}"
      - "Web UI: http://{{ ansible_host | default(inventory_hostname) }}:{{ radarr_web_port }}"
