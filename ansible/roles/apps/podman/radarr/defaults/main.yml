---
radarr_enabled: false

radarr_image: ghcr.io/home-operations/radarr
radarr_image_tag: rolling

radarr_service_name: radarr
radarr_container_name: radarr

radarr_web_port: 7878
radarr_container_port: "{{ radarr_web_port }}"

radarr_timezone: Europe/London

# home-operations images run as nobody (65534) inside the container.
# With rootful Podman (no UID remapping), directories need this ownership.
radarr_container_uid: 65534
radarr_container_gid: 65534

radarr_config_dir: /opt/radarr/config
radarr_movies_dir: /opt/radarr/movies
radarr_downloads_dir: /opt/radarr/downloads

radarr_env_vars:
  TZ: "{{ radarr_timezone }}"

radarr_service_enable: true
radarr_service_start: true
radarr_service_restart: always
