---
# Volume setup and file deployment for {{ _app_name }}.
# Tagged [volumes, setup], skipped on --tags image,deploy runs.
# Runs on first deploy or when volumes/mounts change.

- name: Inspect bind mount sources for {{ _app_name }}
  ansible.builtin.stat:
    path: "{{ vol | split(':') | first }}"
  register: _podman_bind_mount_sources
  loop: "{{ _app.volumes | default([]) }}"
  loop_control:
    loop_var: vol
    label: "{{ vol | split(':') | first }}"
  when: (vol | split(':') | first) is match('^/(?!(dev|proc|sys|run|tmp|mnt)(/|$))')

- name: Create bind mount directories for {{ _app_name }}
  ansible.builtin.file:
    path: >-
      {{
        (
          vol | split(':') | first
          if not (
            not mount_source.stat.exists and
            (vol | split(':') | first | basename is search('\\.'))
          )
          else
          (vol | split(':') | first | dirname)
        )
      }}
    state: directory
    owner: root
    group: root
    mode: '1777'
  loop: "{{ _podman_bind_mount_sources.results | default([]) }}"
  loop_control:
    loop_var: mount_source
    label: "{{ mount_source.vol | split(':') | first }}"
  vars:
    vol: "{{ mount_source.vol }}"
  register: _bind_mount_dirs_result
  when:
    - mount_source.stat is defined
    - not (mount_source.stat.exists and mount_source.stat.isreg | default(false))
    - mount_source.stat.exists
    - (mount_source.stat.mode | default('')) in ['1777', '01777']

- name: Track setup changes from existing bind mount directories for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_bind_mount_dirs_result is changed) }}"
  tags: [volumes, setup]

- name: Create managed bind mount directories for {{ _app_name }}
  ansible.builtin.file:
    path: >-
      {{
        (
          vol | split(':') | first
          if not (
            not mount_source.stat.exists and
            (vol | split(':') | first | basename is search('\\.'))
          )
          else
          (vol | split(':') | first | dirname)
        )
      }}
    state: directory
    owner: "{{ _app.uid | default(0) }}"
    group: "{{ _app.gid | default(0) }}"
    mode: '0755'
  loop: "{{ _podman_bind_mount_sources.results | default([]) }}"
  loop_control:
    loop_var: mount_source
    label: "{{ mount_source.vol | split(':') | first }}"
  vars:
    vol: "{{ mount_source.vol }}"
  register: _managed_bind_mount_dirs_result
  when:
    - mount_source.stat is defined
    - not (mount_source.stat.exists and mount_source.stat.isreg | default(false))
    - not (mount_source.stat.exists and (mount_source.stat.mode | default('')) in ['1777', '01777'])

- name: Track setup changes from managed bind mount directories for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_managed_bind_mount_dirs_result is changed) }}"
  tags: [volumes, setup]

- name: Deploy managed files for {{ _app_name }}
  ansible.builtin.copy:
    content: "{{ file_item.content }}"
    dest: "{{ file_item.dest }}"
    owner: "{{ file_item.owner | default('root') }}"
    group: "{{ file_item.group | default('root') }}"
    mode: "{{ file_item.mode | default('0640') }}"
  loop: "{{ _app.files | default([]) }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  register: _managed_files_result
  tags: [volumes, setup]

- name: Track setup changes from managed files for {{ _app_name }}
  ansible.builtin.set_fact:
    _setup_changed: "{{ _setup_changed or (_managed_files_result is changed) }}"
  tags: [volumes, setup]
