name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.example.*"
      - "**/*.example"
  pull_request:
    branches: [main]
    types: [closed]
    paths-ignore:
      - "**/*.example.*"
      - "**/*.example"
  workflow_dispatch:

jobs:
  dispatch:
    name: Ansible dispatch
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, aah]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && (github.event.pull_request.merge_commit_sha || github.sha) || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install validation dependencies
        run: pip install PyYAML

      - name: Validate LXC inventory identifiers
        run: python ops/lxc_inventory.py --check-duplicates

      - name: Run dispatch
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        run: bash ops/run_dispatch.sh
