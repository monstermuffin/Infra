name: testvm02
hostname: testvm02.aah.muffn.io
vm_id: 240
node_name: pve03
description: Terraform bootstrap validation VM
tags:
  - os_debian
  - site_aah
  - app_test

cpu:
  cores: 1

memory:
  dedicated: 2048
  floating: 2048

network:
  bridge: vmbr1
  ipv4_address: 10.82.7.240/24
  ipv4_gateway: 10.82.7.1
  vlan_id: 707

disks:
  - interface: scsi0
    datastore_id: local-zfs
    size_gb: 16
    from_image: true

agent:
  enabled: true

ha:
  enabled: true
  state: started
  max_restart: 1
  max_relocate: 1

replication:
  enabled: true
  target: pve04
  schedule: "*/15"
